<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Amazon sign-in </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!--navbar -->
    <header class="navbar">
        <div class="nav-logo">
            <img src="images/Logo.png" alt="Amazon Logo">
        </div>
    </header>

    <div class="container">
        <h2>Sign in or create account</h2>

        <label>Enter mobile number or email</label>
        <input type="text" id="loginInput" placeholder="Mobile number or email">
        <p id="error" class="error"></p>
        <button type="button">Continue</button>

        <p class="text">
            By continuing, you agree to Amazon's
            <a href="#">Conditions of Use</a> and
            <a href="#">Privacy Notice</a>.
        </p>
        <hr>

        <p class="text"> <b>Buying for work?</b> <br>
            <a href="#">Create a free business account</a>
        </p>

    </div>

    <footer>
        <div class="footer-lang">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="globe-icon">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
            <span>English</span>
            <span> India</span>
        </div>

        <div class="footer-links">
            <a href="#">Conditions of Use</a>
            <a href="#">Privacy Notice</a>
            <a href="#">Interest-Based Ads</a>
        </div>

        <p>© 1996-2026, Amazon.com, Inc. and its affiliates</p>
    </footer>

    <script>
        const button = document.querySelector("button");
        const input = document.querySelector("#loginInput");
        const error = document.querySelector("#error");

        button.addEventListener("click", function () {

            const value = input.value.trim();

            const pattern = /^[0-9]{10}$|^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (value === "") {
                error.textContent = "Please enter your mobile number or email.";
                input.focus();
            }
            else if (!pattern.test(value)) {
                error.textContent = "Enter a valid mobile number or email.";
                input.focus();
            }
            else {
                error.textContent = "Sign in successful!";
                error.style.color = "green";

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            }

        });
    </script>

</body>

</html>
